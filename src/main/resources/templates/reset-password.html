<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password | Lumiere Salon</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        body.public-booking {
            display: flex;
            align-items: center;
            min-height: 100vh;
        }

        .reset-panel-header {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%) !important;
            color: #fff !important;
            padding: 2rem !important;
            text-align: center !important;
            border-bottom: none !important;
        }

        .reset-panel-header h2 {
            color: #fff !important;
        }
    </style>
</head>

<body class="public-booking">
<div class="container py-5">
    <div class="text-center mb-4 mt-5">
        <div class="logo-circle mx-auto">L</div>
        <h1 class="h2 mb-1 mt-3">Reset Password</h1>
        <p class="text-secondary mb-0">Choose a new secure password for your account.</p>
    </div>

    <div class="card panel mx-auto" style="max-width: 540px;">
        <div class="reset-panel-header">
            <h2 class="h4 mb-0 text-white">Create New Password</h2>
        </div>

        <div class="card-body p-4 p-md-5">
            <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-start rounded-3 mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <div style="font-size: 0.9rem;" th:text="${errorMessage}">This password reset link is invalid.</div>
            </div>

            <form th:if="${validToken}" th:action="@{/reset-password}" method="post"
                  class="row g-4 needs-validation" novalidate autocomplete="off">
                <input type="hidden" name="token" th:value="${token}">

                <div class="col-12">
                    <label for="newPassword" class="form-label">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                        <input type="password" id="newPassword" name="newPassword" class="form-control"
                               minlength="8" placeholder="At least 8 characters" required autofocus>
                        <div class="invalid-feedback">Password must be at least 8 characters long.</div>
                    </div>
                </div>

                <div class="col-12">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-shield-check"></i></span>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control"
                               minlength="8" placeholder="Re-enter password" required>
                        <div class="invalid-feedback">Please confirm your password.</div>
                    </div>
                </div>

                <div class="col-12 pt-2">
                    <button type="submit" class="btn btn-lumiere btn-lg w-100 shadow-sm">
                        <i class="bi bi-check2-circle me-2"></i>Reset Password
                    </button>
                </div>
            </form>

            <div th:if="${!validToken}" class="text-center">
                <a th:href="@{/forgot-password}" class="btn btn-lumiere-outline">
                    <i class="bi bi-envelope me-2"></i>Request a New Link
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        'use strict';
        const form = document.querySelector('.needs-validation');
        if (!form) return;

        form.addEventListener('submit', function (event) {
            const newPassword = document.getElementById('newPassword');
            const confirmPassword = document.getElementById('confirmPassword');
            if (newPassword && confirmPassword && newPassword.value !== confirmPassword.value) {
                confirmPassword.setCustomValidity('Passwords must match.');
            } else if (confirmPassword) {
                confirmPassword.setCustomValidity('');
            }

            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            form.classList.add('was-validated');
        }, false);
    })();
</script>
</body>
</html>
