<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Lumière Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(160deg, #fff9fb 0%, #fdf4f7 50%, #f9eef3 100%);
            min-height: 100vh;
            color: #5f4a55;
            display: flex;
            align-items: center;
        }
        .panel {
            border: none;
            border-radius: 1rem;
            background-color: #fffdfd;
            box-shadow: 0 1rem 2rem rgba(173, 127, 141, 0.16);
            overflow: hidden;
        }
        .panel-header {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%);
            color: #fff;
            padding: 2rem;
            text-align: center;
        }
        .btn-lumiere {
            background-color: #d9a5b3;
            border-color: #d9a5b3;
            color: #fff;
        }
        .btn-lumiere:hover {
            background-color: #c88f9f;
            border-color: #c88f9f;
            color: #fff;
        }
        .btn-lumiere-outline {
            border-color: #d9a5b3;
            color: #a66f82;
            background-color: #fff9fb;
        }
        .btn-lumiere-outline:hover {
            background-color: #f4dde4;
            border-color: #d9a5b3;
            color: #8f596c;
        }
        .form-control, .form-select {
            border-color: #e7c7d2;
        }
        .form-control:focus, .form-select:focus {
            border-color: #d9a5b3;
            box-shadow: 0 0 0 0.2rem rgba(217, 165, 179, 0.2);
        }
        .locked-field {
            background-color: #fdf4f7; 
            font-weight: bold; 
            color: #8f596c;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card panel">
                <div class="panel-header">
                    <h1 class="h3 mb-2 fw-bold">Schedule Your Visit</h1>
                    <p class="mb-0 opacity-75">Select your desired service, date, and time below.</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/appointments(action='public-book')}" method="post">
                        
                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label for="appointmentId" class="form-label fw-semibold" style="color: #a66f82;">Booking ID</label>
                                <input type="number" id="appointmentId" name="appointmentId" class="form-control form-control-lg locked-field" th:value="${generatedAppointmentId}" readonly>
                            </div>

                            <div class="col-md-6">
                                <label for="customerName" class="form-label fw-semibold" style="color: #a66f82;">Client Name</label>
                                <input type="text" id="customerName" name="customerName" class="form-control form-control-lg locked-field" th:value="${customerName}" readonly>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="serviceName" class="form-label fw-semibold">Select Service</label>
                            <select id="serviceName" name="serviceName" class="form-select form-select-lg" required>
                                <option value="" disabled selected>Choose a premium treatment...</option>
                                <option value="Lumière Signature Facial">Lumière Signature Facial</option>
                                <option value="Bespoke Hair Styling">Bespoke Hair Styling</option>
                                <option value="Luxury Gel Manicure">Luxury Gel Manicure</option>
                                <option value="Keratin Smoothing Treatment">Keratin Smoothing Treatment</option>
                                <option value="Bridal Hair & Makeup Package">Bridal Hair & Makeup Package</option>
                                <option value="Classic Gentlemen's Grooming">Classic Gentlemen's Grooming</option>
                            </select>
                        </div>

                        <div class="row g-4 mb-5">
                            <div class="col-md-6">
                                <label for="appointmentDate" class="form-label fw-semibold">Preferred Date</label>
                                <input type="date" id="appointmentDate" name="appointmentDate" class="form-control form-control-lg" required>
                            </div>
                            <div class="col-md-6">
                                <label for="appointmentTime" class="form-label fw-semibold">Preferred Time</label>
                                <input type="time" id="appointmentTime" name="appointmentTime" class="form-control form-control-lg" required>
                            </div>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-lumiere btn-lg px-4 flex-grow-1 fw-bold">Confirm Booking</button>
                            <a th:href="@{/my-portal}" class="btn btn-lumiere-outline btn-lg px-4 fw-bold">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
