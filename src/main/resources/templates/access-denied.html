<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Restricted | Lumiere Salon</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">
</head>
<body class="admin-body d-flex align-items-center" style="min-height: 100vh;">
<div class="container py-5">
    <div class="card panel mx-auto text-center" style="max-width: 640px;">
        <div class="card-body p-4 p-md-5">
            <div class="logo-circle mx-auto mb-4">L</div>
            <div class="mb-4">
                <i class="bi bi-shield-lock-fill display-4" style="color: var(--lumiere-pink);"></i>
            </div>
            <h1 class="h2 mb-3">Access Restricted</h1>
            <p class="text-secondary mb-4">
                Your current account type does not have permission to access this page.
                Please return to your dashboard or log in with the correct account.
            </p>

            <div class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                <a th:if="${session.staffRole == 'MANAGER'}" th:href="@{/admin}" class="btn btn-lumiere">
                    <i class="bi bi-grid-1x2-fill me-2"></i>Back to Dashboard
                </a>
                <a th:if="${session.staffRole == 'STYLIST'}" th:href="@{/stylist-portal}" class="btn btn-lumiere">
                    <i class="bi bi-calendar-check me-2"></i>Back to Workspace
                </a>
                <a th:if="${session.staffRole == null}" th:href="@{/my-portal}" class="btn btn-lumiere">
                    <i class="bi bi-person-heart me-2"></i>Back to Portal
                </a>
                <a th:href="@{/}" class="btn btn-lumiere-outline">
                    <i class="bi bi-house-door me-2"></i>Main Site
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
