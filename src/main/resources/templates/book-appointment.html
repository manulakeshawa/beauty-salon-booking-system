<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Appointment | Luxe Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #fff9fb 0%, #fdf4f7 55%, #f9eef3 100%);
            min-height: 100vh;
            color: #5f4a55;
        }
        .booking-card {
            border: none;
            border-radius: 1rem;
            background-color: #fffdfd;
            box-shadow: 0 1rem 2rem rgba(173, 127, 141, 0.16);
            overflow: hidden;
        }
        .booking-header {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%);
            color: #fff;
            padding: 2rem;
        }
        .form-control,
        .form-select {
            border-color: #e7c7d2;
        }
        .form-control:focus,
        .form-select:focus {
            border-color: #d9a5b3;
            box-shadow: 0 0 0 0.2rem rgba(217, 165, 179, 0.2);
        }
        .btn-lumiere {
            background-color: #d9a5b3;
            border-color: #d9a5b3;
            color: #fff;
        }
        .btn-lumiere:hover {
            background-color: #c88f9f;
            border-color: #c88f9f;
            color: #fff;
        }
        .btn-lumiere-outline {
            border-color: #d9a5b3;
            color: #a66f82;
            background-color: #fff9fb;
        }
        .btn-lumiere-outline:hover {
            background-color: #f4dde4;
            border-color: #d9a5b3;
            color: #8f596c;
        }
    </style>
</head>
<body class="d-flex align-items-center py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card booking-card">
                <div class="booking-header">
                    <h1 class="h3 mb-1">Book a New Appointment</h1>
                    <p class="mb-0 opacity-75">Create a premium salon experience for your client in seconds.</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/appointments(action='new')}" method="post" class="needs-validation" novalidate>
                        <input type="hidden" name="appointmentId" th:value="${generatedAppointmentId}">

                        <div class="mb-3">
                            <label for="customerName" class="form-label fw-semibold">Customer Name</label>
                            <input type="text" class="form-control form-control-lg" id="customerName" name="customerName"
                                   placeholder="Enter customer full name" required>
                        </div>

                        <div class="mb-3">
                            <label for="serviceName" class="form-label fw-semibold">Service Name</label>
                            <input type="text" class="form-control form-control-lg" id="serviceName" name="serviceName"
                                   placeholder="e.g., Signature Facial, Bridal Makeup" required>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="appointmentDate" class="form-label fw-semibold">Appointment Date</label>
                                <input type="date" class="form-control form-control-lg" id="appointmentDate"
                                       name="appointmentDate" required>
                            </div>
                            <div class="col-md-6">
                                <label for="appointmentTime" class="form-label fw-semibold">Appointment Time</label>
                                <input type="time" class="form-control form-control-lg" id="appointmentTime"
                                       name="appointmentTime" required>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-lumiere btn-lg px-4">Create Appointment</button>
                            <a th:href="@{/appointments(action='list')}" class="btn btn-lumiere-outline btn-lg px-4">View Appointments</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
