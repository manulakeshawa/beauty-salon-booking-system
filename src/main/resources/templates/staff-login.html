<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Access | Lumière Salon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">
    
    <style>
        body {
            display: flex;
            align-items: center;
            min-height: 100vh;
        }

        .login-card {
            border: none;
            border-radius: 1.5rem;
            background-color: #fffdfd;
            box-shadow: 0 1.5rem 4rem rgba(173, 127, 141, 0.15);
            overflow: hidden;
            border: 1px solid rgba(231, 199, 210, 0.4);
        }

        .login-header {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%);
            color: #fff;
            padding: 2.5rem 2rem;
            text-align: center;
        }

        .alert-lumiere {
            background-color: #fff5f7;
            border: 1px solid #f2d7df;
            color: #b37a8c;
            border-radius: 12px;
            font-weight: 500;
        }
    </style>
</head>

<body class="admin-body"> <div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5 col-xl-4">
            
            <div class="text-center mb-2">
                <div class="logo-circle mx-auto">L</div>
            </div>

            <div class="card login-card">
                <div class="login-header">
                    <h2 class="h3 mb-1 fw-bold text-white">Staff Access</h2>
                    <p class="mb-0 opacity-75 small text-uppercase tracking-widest text-white">Authorized Personnel Only</p>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <div th:if="${successMessage}" class="alert alert-success text-center mb-4 py-2 rounded-3" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        <span th:text="${successMessage}">Your password has been set.</span>
                    </div>
                    
                    <div th:if="${error}" class="alert alert-lumiere text-center mb-4 py-2" role="alert">
                        <i class="bi bi-exclamation-circle me-2"></i>
                        <span th:text="${error}">Invalid Credentials</span>
                    </div>

                    <form th:action="@{/staff-login}" method="post" autocomplete="off">
                        
                        <div class="mb-4">
                            <label for="username" class="form-label">Personnel ID</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person-badge"></i></span>
                                <input type="text" class="form-control" id="username" name="username" 
                                       placeholder="Enter your ID" required autofocus>
                            </div>
                        </div>

                        <div class="mb-5">
                            <label for="password" class="form-label">Security Password</label>
                            <div class="input-group password-container">
                                <span class="input-group-text" style="border-radius: 10px 0 0 10px !important;"><i class="bi bi-shield-lock"></i></span>
                                <input type="password" class="form-control" id="password" name="password" 
                                       placeholder="••••••••" required style="border-radius: 0 10px 10px 0 !important; padding-right: 45px;">
                                <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-lumiere btn-lg w-100 shadow-sm">
                            Secure Login <i class="bi bi-arrow-right-circle ms-2"></i>
                        </button>
                    </form>

                    <div class="text-center mt-4 pt-2">
                        <a href="/" class="text-muted text-decoration-none small hover-pink">
                            <i class="bi bi-house-door me-1"></i> Return to Main Site
                        </a>
                    </div>
                </div>
            </div>
            
            <p class="text-center text-muted mt-4" style="font-size: 0.7rem; opacity: 0.6;">
                Lumière Professional Management System v2.0<br>
                © 2026 Lumière Salon & Spa
            </p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const passwordField = document.querySelector('#password');

    togglePassword.addEventListener('click', function () {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });
</script>

</body>
</html>
