<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Staff Access | Lumière Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(160deg, #fff9fb 0%, #fdf4f7 50%, #f9eef3 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .login-card {
            border: none;
            border-radius: 1.5rem;
            box-shadow: 0 1rem 3rem rgba(173, 127, 141, 0.15);
            background: #fff;
            overflow: hidden;
        }
        .login-header {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%);
            padding: 2rem;
            text-align: center;
            color: white;
        }
        .form-control:focus {
            border-color: #d9a5b3;
            box-shadow: 0 0 0 0.2rem rgba(217, 165, 179, 0.25);
        }
        .btn-lumiere {
            background-color: #d9a5b3;
            border-color: #d9a5b3;
            color: #fff;
            border-radius: 50px;
        }
        .btn-lumiere:hover {
            background-color: #c88f9f;
            border-color: #c88f9f;
            color: #fff;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="login-card">
                <div class="login-header">
                    <h2 class="fw-bold mb-1">LUMIÈRE</h2>
                    <p class="mb-0 opacity-75 text-uppercase tracking-wide" style="font-size: 0.85rem; letter-spacing: 2px;">Authorized Personnel Only</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <div th:if="${error}" class="alert alert-danger text-center" role="alert" th:text="${error}"></div>
                    <form th:action="@{/staff-login}" method="post">
                        <div class="mb-4">
                            <label for="username" class="form-label fw-semibold" style="color: #6d4c53;">Staff ID</label>
                            <input type="text" class="form-control form-control-lg bg-light" id="username" name="username" required autofocus>
                        </div>
                        <div class="mb-5">
                            <label for="password" class="form-label fw-semibold" style="color: #6d4c53;">Password</label>
                            <input type="password" class="form-control form-control-lg bg-light" id="password" name="password" required>
                        </div>
                        <button type="submit" class="btn btn-lumiere btn-lg w-100 fw-bold shadow-sm">Secure Login</button>
                    </form>
                    <div class="text-center mt-4">
                        <a href="/" class="text-muted text-decoration-none small">← Return to Main Site</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
