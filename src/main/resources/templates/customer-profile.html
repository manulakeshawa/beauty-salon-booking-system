<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account Settings | Lumiere Salon</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        body.customer-portal .navbar {
            background-color: white !important;
            border-bottom: 1px solid rgba(217, 165, 179, 0.2);
            padding: 1rem 0;
        }

        body.customer-portal .panel-header {
            background: #fcf6f8 !important;
            border-bottom: 1px solid #f2e4e8;
            padding: 1.5rem 2rem;
            text-align: left;
        }

        .logo-circle {
            width: 40px;
            height: 40px;
            font-size: 1.3rem;
            margin-right: 12px;
            margin-bottom: 0;
        }
    </style>
</head>
<body class="customer-portal">
<nav class="navbar sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center" th:href="@{/my-portal}">
            <div class="logo-circle">L</div>
            <span class="fs-4 tracking-wider">LUMIERE</span>
        </a>
        <div class="d-flex align-items-center gap-2">
            <a th:href="@{/my-portal}" class="btn btn-lumiere-outline btn-sm rounded-pill px-3 fw-bold">
                <i class="bi bi-arrow-left me-1"></i> Portal
            </a>
            <form th:action="@{/logout}" method="post" class="d-inline">
                <button type="submit" class="btn btn-outline-danger btn-sm rounded-pill px-3 fw-bold">Sign Out</button>
            </form>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-4 shadow-sm border-0 mb-4" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <strong th:text="${successMessage}">Updated.</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-4 shadow-sm border-0 mb-4" role="alert" style="background-color: #fdf1f4; color: #a62a4b;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <strong th:text="${errorMessage}">Update failed.</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="portal-welcome text-center text-md-start mb-4">
        <h1 class="display-6 mb-2">Account Settings</h1>
        <p class="text-secondary mb-0" th:text="${customer.name}">Customer Name</p>
    </div>

    <div class="row g-4">
        <div class="col-lg-6">
            <div class="card panel h-100">
                <div class="panel-header">
                    <h2 class="h5 mb-0"><i class="bi bi-person-gear me-2" style="color: var(--lumiere-pink);"></i>Profile Details</h2>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/customer-profile}" method="post" class="needs-validation" novalidate>
                        <input type="hidden" name="action" value="update-profile">

                        <div class="mb-4">
                            <label for="name" class="form-label">Full Name</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-person"></i></span>
                                <input type="text" id="name" name="name" class="form-control" th:value="${customer.name}" required>
                                <div class="invalid-feedback">Please enter your name.</div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                <input type="email" id="email" name="email" class="form-control" th:value="${customer.email}" required>
                                <div class="invalid-feedback">Please enter a valid email address.</div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-lumiere shadow-sm w-100">
                            <i class="bi bi-save me-2"></i>Save Profile
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-lg-6">
            <div class="card panel h-100">
                <div class="panel-header">
                    <h2 class="h5 mb-0"><i class="bi bi-shield-lock me-2" style="color: var(--lumiere-pink);"></i>Password</h2>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/customer-profile}" method="post" class="needs-validation" novalidate>
                        <input type="hidden" name="action" value="change-password">

                        <div class="mb-4">
                            <label for="currentPassword" class="form-label">Current Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-lock"></i></span>
                                <input type="password" id="currentPassword" name="currentPassword" class="form-control" required>
                                <div class="invalid-feedback">Please enter your current password.</div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="newPassword" class="form-label">New Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key"></i></span>
                                <input type="password" id="newPassword" name="newPassword" class="form-control" minlength="8" required>
                                <div class="invalid-feedback">Password must be at least 8 characters long.</div>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="confirmPassword" class="form-label">Confirm Password</label>
                            <div class="input-group">
                                <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                                <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" minlength="8" required>
                                <div class="invalid-feedback">Please confirm your new password.</div>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-lumiere shadow-sm w-100">
                            <i class="bi bi-shield-check me-2"></i>Change Password
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        'use strict';
        var forms = document.querySelectorAll('.needs-validation');
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (e) {
                if (!form.checkValidity()) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>
</body>
</html>
