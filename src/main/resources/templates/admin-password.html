<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Change Password | Lumiere Salon</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        .admin-password-header {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%) !important;
            padding: 1.8rem 2rem !important;
            border-bottom: none !important;
            border-radius: 1.5rem 1.5rem 0 0;
        }
    </style>
</head>
<body class="admin-body py-5">
<div class="container">
    <div class="row align-items-center mb-5">
        <div class="col-md-7 mb-3 mb-md-0">
            <div class="d-flex align-items-center">
                <div class="logo-circle me-3">L</div>
                <div>
                    <h1 class="h2 mb-0 text-dark">Change Password</h1>
                    <p class="text-secondary mb-0" th:text="${session.staffName}">Admin</p>
                </div>
            </div>
        </div>
        <div class="col-md-5 text-md-end">
            <a th:href="@{/admin}" class="btn btn-lumiere-outline">
                <i class="bi bi-arrow-left me-2"></i>Back to Dashboard
            </a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show rounded-4 shadow-sm border-0 mb-4" role="alert">
        <i class="bi bi-check-circle-fill me-2"></i>
        <strong th:text="${successMessage}">Updated.</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-4 shadow-sm border-0 mb-4" role="alert" style="background-color: #fdf1f4; color: #a62a4b;">
        <i class="bi bi-exclamation-triangle-fill me-2"></i>
        <strong th:text="${errorMessage}">Update failed.</strong>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div class="card panel mx-auto" style="max-width: 620px;">
        <div class="admin-password-header">
            <h2 class="h4 mb-0 text-white"><i class="bi bi-shield-lock me-2"></i>Admin Password</h2>
        </div>

        <div class="card-body p-4 p-md-5">
            <form th:action="@{/admin-password}" method="post" class="needs-validation" novalidate>
                <div class="mb-4">
                    <label for="currentPassword" class="form-label">Current Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" id="currentPassword" name="currentPassword" class="form-control" required>
                        <div class="invalid-feedback">Please enter your current password.</div>
                    </div>
                </div>

                <div class="mb-4">
                    <label for="newPassword" class="form-label">New Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key"></i></span>
                        <input type="password" id="newPassword" name="newPassword" class="form-control" minlength="8" required>
                        <div class="invalid-feedback">Password must be at least 8 characters long.</div>
                    </div>
                </div>

                <div class="mb-5">
                    <label for="confirmPassword" class="form-label">Confirm Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-key-fill"></i></span>
                        <input type="password" id="confirmPassword" name="confirmPassword" class="form-control" minlength="8" required>
                        <div class="invalid-feedback">Please confirm your new password.</div>
                    </div>
                </div>

                <button type="submit" class="btn btn-lumiere shadow-sm w-100">
                    <i class="bi bi-shield-check me-2"></i>Change Password
                </button>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        'use strict';
        var forms = document.querySelectorAll('.needs-validation');
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (e) {
                if (!form.checkValidity()) {
                    e.preventDefault();
                    e.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>
</body>
</html>
