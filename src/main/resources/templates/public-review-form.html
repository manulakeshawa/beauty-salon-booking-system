<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Share Your Experience | Lumière Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(160deg, #fff9fb 0%, #fdf4f7 50%, #f9eef3 100%);
            min-height: 100vh;
            color: #5f4a55;
            display: flex;
            align-items: center;
        }
        .panel {
            border: none;
            border-radius: 1rem;
            background-color: #fffdfd;
            box-shadow: 0 1rem 2rem rgba(173, 127, 141, 0.16);
            overflow: hidden;
        }
        .panel-header {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%);
            color: #fff;
            padding: 2rem;
            text-align: center;
        }
        .btn-lumiere {
            background-color: #d9a5b3;
            border-color: #d9a5b3;
            color: #fff;
        }
        .btn-lumiere:hover {
            background-color: #c88f9f;
            border-color: #c88f9f;
            color: #fff;
        }
        .btn-lumiere-outline {
            border-color: #d9a5b3;
            color: #a66f82;
            background-color: #fff9fb;
        }
        .btn-lumiere-outline:hover {
            background-color: #f4dde4;
            border-color: #d9a5b3;
            color: #8f596c;
        }
        .form-control, .form-select {
            border-color: #e7c7d2;
        }
        .form-control:focus, .form-select:focus {
            border-color: #d9a5b3;
            box-shadow: 0 0 0 0.2rem rgba(217, 165, 179, 0.2);
        }
        .locked-field {
            background-color: #fdf4f7; 
            font-weight: bold; 
            color: #8f596c;
            cursor: not-allowed;
        }
    </style>
</head>
<body class="py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card panel">
                <div class="panel-header">
                    <h1 class="h3 mb-2 fw-bold">Share Your Experience</h1>
                    <p class="mb-0 opacity-75">Your feedback helps us perfect the Lumière experience.</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/submitPublicReview}" method="post">
                        
                        <div class="mb-4">
                            <label for="customerName" class="form-label fw-semibold" style="color: #a66f82;">Client Name</label>
                            <input type="text" id="customerName" name="customerName" class="form-control form-control-lg locked-field" th:value="${customerName}" readonly>
                        </div>

                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label for="serviceName" class="form-label fw-semibold">Service Received</label>
                                <select id="serviceName" name="serviceName" class="form-select form-select-lg" required>
                                    <option value="" disabled selected>Select service...</option>
                                    <option value="Lumière Signature Facial">Lumière Signature Facial</option>
                                    <option value="Bespoke Hair Styling">Bespoke Hair Styling</option>
                                    <option value="Luxury Gel Manicure">Luxury Gel Manicure</option>
                                    <option value="Keratin Smoothing Treatment">Keratin Smoothing Treatment</option>
                                    <option value="Bridal Hair & Makeup Package">Bridal Hair & Makeup Package</option>
                                    <option value="Classic Gentlemen's Grooming">Classic Gentlemen's Grooming</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="stylistName" class="form-label fw-semibold">Stylist Name (Optional)</label>
                                <input type="text" id="stylistName" name="stylistName" class="form-control form-control-lg" placeholder="e.g., Kasun">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label for="rating" class="form-label fw-semibold">Rating</label>
                            <select id="rating" name="rating" class="form-select form-select-lg" required>
                                <option value="5">5 - Excellent (Highly Recommend)</option>
                                <option value="4">4 - Good (Very Satisfied)</option>
                                <option value="3">3 - Average (Satisfied)</option>
                                <option value="2">2 - Poor (Needs Improvement)</option>
                                <option value="1">1 - Very Poor (Disappointed)</option>
                            </select>
                        </div>

                        <div class="mb-5">
                            <label for="comment" class="form-label fw-semibold">Your Review</label>
                            <textarea id="comment" name="comment" class="form-control" rows="4" placeholder="Tell us about your visit..." required></textarea>
                        </div>

                        <div class="d-flex gap-3">
                            <button type="submit" class="btn btn-lumiere btn-lg px-4 flex-grow-1 fw-bold">Submit Review</button>
                            <a th:href="@{/my-portal}" class="btn btn-lumiere-outline btn-lg px-4 fw-bold">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
