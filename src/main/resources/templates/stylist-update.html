<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Stylist | Luxe Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(160deg, #fff9fb 0%, #fdf4f7 50%, #f9eef3 100%);
            min-height: 100vh;
            color: #5f4a55;
        }
        .panel {
            border: none;
            border-radius: 1rem;
            background-color: #fffdfd;
            box-shadow: 0 1rem 2rem rgba(173, 127, 141, 0.16);
            overflow: hidden;
        }
        .panel-header {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%);
            color: #fff;
            padding: 1.6rem 2rem;
        }
        .btn-lumiere {
            background-color: #d9a5b3;
            border-color: #d9a5b3;
            color: #fff;
        }
        .btn-lumiere:hover {
            background-color: #c88f9f;
            border-color: #c88f9f;
            color: #fff;
        }
        .btn-lumiere-outline {
            border-color: #d9a5b3;
            color: #a66f82;
            background-color: #fff9fb;
        }
        .btn-lumiere-outline:hover {
            background-color: #f4dde4;
            border-color: #d9a5b3;
            color: #8f596c;
        }
        .form-control,
        .form-select {
            border-color: #e7c7d2;
        }
        .form-control:focus,
        .form-select:focus {
            border-color: #d9a5b3;
            box-shadow: 0 0 0 0.2rem rgba(217, 165, 179, 0.2);
        }
    </style>
</head>
<body class="py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-8 col-xl-7">
            <div class="card panel">
                <div class="panel-header">
                    <h1 class="h3 mb-1">Update Stylist Profile</h1>
                    <p class="mb-0 opacity-75">Edit stylist account details with the Lumiere Salon touch.</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/stylists(action='update')}" method="post">
                        <input type="hidden" name="userId" th:value="${stylist.userId}">

                        <div class="row g-3">
                            <div class="col-md-6">
                                <label for="name" class="form-label fw-semibold">Name</label>
                                <input type="text" id="name" name="name" class="form-control form-control-lg"
                                       th:value="${stylist.name}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="email" class="form-label fw-semibold">Email</label>
                                <input type="email" id="email" name="email" class="form-control form-control-lg"
                                       th:value="${stylist.email}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="password" class="form-label fw-semibold">Password</label>
                                <input type="text" id="password" name="password" class="form-control form-control-lg"
                                       placeholder="Leave blank to keep the current password">
                            </div>
                            <div class="col-md-6">
                                <label for="specialty" class="form-label fw-semibold">Specialty</label>
                                <input type="text" id="specialty" name="specialty" class="form-control form-control-lg"
                                       th:value="${stylist.specialty}" required>
                            </div>
                            <div class="col-md-6">
                                <label for="level" class="form-label fw-semibold">Level</label>
                                <select id="level" name="level" class="form-select form-select-lg" required>
                                    <option value="Junior" th:selected="${stylist.level == 'Junior'}">Junior</option>
                                    <option value="Senior" th:selected="${stylist.level == 'Senior'}">Senior</option>
                                    <option value="Lead" th:selected="${stylist.level == 'Lead'}">Lead</option>
                                    <option value="Master" th:selected="${stylist.level == 'Master'}">Master</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label for="available" class="form-label fw-semibold">Availability</label>
                                <select id="available" name="available" class="form-select form-select-lg" required>
                                    <option th:value="true" th:selected="${stylist.available}">Available</option>
                                    <option th:value="false" th:selected="${!stylist.available}">Unavailable</option>
                                </select>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn btn-lumiere btn-lg px-4">Update Stylist</button>
                            <a th:href="@{/stylists(action='list')}" class="btn btn-lumiere-outline btn-lg px-4">Cancel</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
