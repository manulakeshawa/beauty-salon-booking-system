<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stylist Availability | Luxe Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(160deg, #fff9fb 0%, #fdf4f7 50%, #f9eef3 100%);
            min-height: 100vh;
            color: #5f4a55;
        }
        .panel {
            border: none;
            border-radius: 1rem;
            background-color: #fffdfd;
            box-shadow: 0 1rem 2rem rgba(173, 127, 141, 0.16);
            overflow: hidden;
        }
        .panel-header {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%);
            color: #fff;
            padding: 1.6rem 2rem;
        }
        .table {
            color: #5f4a55;
        }
        .table thead th {
            background-color: #f2d7df !important;
            color: #7a5464;
            border-bottom-color: #e7c7d2;
        }
        .table > :not(caption) > * > * {
            padding: 0.95rem 0.85rem;
            vertical-align: middle;
        }
        .btn-lumiere {
            background-color: #d9a5b3;
            border-color: #d9a5b3;
            color: #fff;
        }
        .btn-lumiere:hover {
            background-color: #c88f9f;
            border-color: #c88f9f;
            color: #fff;
        }
        .btn-lumiere-outline {
            border-color: #d9a5b3;
            color: #a66f82;
            background-color: #fff9fb;
        }
        .btn-lumiere-outline:hover {
            background-color: #f4dde4;
            border-color: #d9a5b3;
            color: #8f596c;
        }
        .badge-lumiere {
            background-color: #f2d7df;
            color: #8f596c;
            font-weight: 600;
            border: 1px solid #e7c7d2;
        }
        .form-select {
            border-color: #e7c7d2;
        }
        .form-select:focus {
            border-color: #d9a5b3;
            box-shadow: 0 0 0 0.2rem rgba(217, 165, 179, 0.2);
        }
    </style>
</head>
<body class="py-5">
<div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <div>
            <h1 class="h2 mb-1">Stylist Availability</h1>
            <p class="text-secondary mb-0">Manage today’s team readiness with elegance and precision.</p>
        </div>
        <a th:href="@{/stylists(action='list')}" class="btn btn-lumiere-outline btn-lg">Back to Stylists</a>
    </div>

    <div class="card panel">
        <div class="panel-header">
            <h2 class="h4 mb-0">Stylist Availability Board</h2>
        </div>
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                    <tr>
                        <th scope="col">Stylist</th>
                        <th scope="col">Specialty</th>
                        <th scope="col">Level</th>
                        <th scope="col">Current Status</th>
                        <th scope="col" class="text-end">Update</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${stylists != null and !stylists.isEmpty()}" th:each="stylist : ${stylists}">
                        <td class="fw-semibold" th:text="${stylist.name}"></td>
                        <td th:text="${stylist.specialty}"></td>
                        <td><span class="badge rounded-pill badge-lumiere" th:text="${stylist.level}"></span></td>
                        <td><span class="badge rounded-pill badge-lumiere" th:text="${stylist.availabilityStatus}"></span></td>
                        <td class="text-end">
                            <form th:action="@{/stylists(action='availability')}" method="post" class="d-inline-flex gap-2">
                                <input type="hidden" name="userId" th:value="${stylist.userId}">
                                <select name="available" class="form-select form-select-sm"
                                        th:disabled="${session.staffRole != 'MANAGER'}">
                                    <option th:value="true" th:selected="${stylist.available}">Available</option>
                                    <option th:value="false" th:selected="${!stylist.available}">Unavailable</option>
                                </select>
                                <button type="submit" class="btn btn-lumiere btn-sm"
                                        th:if="${session.staffRole == 'MANAGER'}">Save</button>
                            </form>
                        </td>
                    </tr>
                    <tr th:if="${stylists == null or stylists.isEmpty()}">
                        <td colspan="5" class="text-center py-5 text-secondary">
                            No stylists registered yet. Click <strong>Register Stylist</strong> to get started.
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
