<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | Lumiere Salon</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        body.public-booking {
            display: flex;
            align-items: center;
            min-height: 100vh;
        }

        .reset-panel-header {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%) !important;
            color: #fff !important;
            padding: 2rem !important;
            text-align: center !important;
            border-bottom: none !important;
        }

        .reset-panel-header h2 {
            color: #fff !important;
        }
    </style>
</head>

<body class="public-booking">
<div class="container py-5">
    <div class="text-center mb-4 mt-5">
        <div class="logo-circle mx-auto">L</div>
        <h1 class="h2 mb-1 mt-3">Forgot Password</h1>
        <p class="text-secondary mb-0">Enter your email address to request a secure reset link.</p>
    </div>

    <div class="card panel mx-auto" style="max-width: 540px;">
        <div class="reset-panel-header">
            <h2 class="h4 mb-0 text-white">Password Reset</h2>
        </div>

        <div class="card-body p-4 p-md-5">
            <div th:if="${successMessage}" class="alert alert-success d-flex align-items-start rounded-3 mb-4" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <div style="font-size: 0.9rem;" th:text="${successMessage}">
                    If an account exists with this email, a password reset link has been sent.
                </div>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-start rounded-3 mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <div style="font-size: 0.9rem;" th:text="${errorMessage}">Please enter a valid email address.</div>
            </div>

            <form th:action="@{/forgot-password}" method="post" class="row g-4 needs-validation" novalidate autocomplete="off">
                <div class="col-12">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="email" name="email" class="form-control"
                               placeholder="yourname@email.com" th:value="${email}" required autofocus>
                        <div class="invalid-feedback">Please enter a valid email address.</div>
                    </div>
                </div>

                <div class="col-12 pt-2">
                    <button type="submit" class="btn btn-lumiere btn-lg w-100 shadow-sm">
                        <i class="bi bi-send me-2"></i>Send Reset Link
                    </button>
                </div>
            </form>

            <div class="text-center mt-4">
                <a th:href="@{/customers(action='login')}" class="text-muted text-decoration-none small me-3">
                    Customer Login
                </a>
                <a th:href="@{/staff-login}" class="text-muted text-decoration-none small">
                    Staff Login
                </a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    (function () {
        'use strict';
        const form = document.querySelector('.needs-validation');
        if (!form) return;

        form.addEventListener('submit', function (event) {
            if (!form.checkValidity()) {
                event.preventDefault();
                event.stopPropagation();
            }
            form.classList.add('was-validated');
        }, false);
    })();
</script>
</body>
</html>
