<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Update Customer | Lumière Salon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        /* Restores the specific pink gradient header just for this form */
        .update-panel-header-override {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%) !important;
            padding: 1.8rem 2rem !important;
            border-bottom: none !important;
            border-radius: 1.5rem 1.5rem 0 0;
        }

        /* Restored your exact readonly styling */
        .form-control[readonly] {
            background-color: #fdf4f7 !important;
            color: #8f596c !important;
            border-style: dashed !important;
            font-weight: 700 !important;
        }
    </style>
</head>

<body class="py-5">
<div class="container">
    
    <div class="row align-items-center mb-5">
        <div class="col-md-7 mb-3 mb-md-0">
            <div class="d-flex align-items-center">
                <div class="logo-circle me-3">L</div>
                <div>
                    <h1 class="h2 mb-0 text-dark">Update Profile</h1>
                    <p class="text-secondary mb-0">Modify client information with Lumière precision.</p>
                </div>
            </div>
        </div>
        <div class="col-md-5 text-md-end">
            <a th:href="@{/customers(action='list')}" class="btn btn-lumiere-outline">
                <i class="bi bi-arrow-left me-2"></i>Back to Customer List
            </a>
        </div>
    </div>

    <div class="card panel mx-auto" style="max-width: 900px;">
        <div class="update-panel-header-override">
            <h2 class="h4 mb-0 text-white"><i class="bi bi-pencil-square me-2"></i>Customer Information</h2>
        </div>
        
        <div class="card-body p-4 p-md-5">
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-4 shadow-sm border-0 mb-4" role="alert" style="background-color: #fdf1f4; color: #a62a4b;">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <strong th:text="${errorMessage}">This email address is already used by another account.</strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <form th:action="@{/customers}" method="post" class="row g-4" autocomplete="off">
                <input type="hidden" name="action" value="update">
                <input type="hidden" name="userId" th:value="${customer.userId}">

                <div class="col-md-4">
                    <label class="form-label">System Account ID</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-hash"></i></span>
                        <input type="text" class="form-control" th:value="${customer.userId}" readonly>
                    </div>
                </div>

                <div class="col-md-8">
                    <label for="name" class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-person"></i></span>
                        <input type="text" id="name" name="name" class="form-control" th:value="${customer.name}" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="email" name="email" class="form-control" th:value="${customer.email}" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="customerType" class="form-label">Membership Tier</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white"><i class="bi bi-star"></i></span>
                        <select id="customerType" name="customerType" class="form-select" required>
                            <option value="Regular" th:selected="${customer.customerType == 'Regular'}">Regular Client</option>
                            <option value="Premium" th:selected="${customer.customerType == 'Premium'}">Premium Member</option>
                        </select>
                    </div>
                </div>

                <div class="col-12 mt-5 border-top pt-4">
                    <div class="d-flex gap-3 justify-content-end">
                        <a th:href="@{/customers(action='list')}" class="btn btn-lumiere-outline">Cancel</a>
                        <button type="submit" class="btn btn-lumiere shadow-sm">
                            <i class="bi bi-save me-2"></i>Save Changes
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
