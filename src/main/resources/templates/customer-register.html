<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Customer | Lumière Salon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <style>
        :root {
            --lumiere-pink: #d9a5b3;
            --lumiere-dark: #5f4a55;
            --lumiere-soft: #fcf1f4;
            --lumiere-bg: #fff9fb;
        }

        body {
            background: linear-gradient(160deg, var(--lumiere-bg) 0%, #fdf4f7 50%, #f9eef3 100%);
            min-height: 100vh;
            color: var(--lumiere-dark);
            font-family: 'Inter', sans-serif;
        }

        h1, h2, h3 {
            font-family: 'Playfair Display', serif;
            color: #3d2b34;
        }

        /* Branding Logo Circle */
        .logo-circle {
            width: 45px;
            height: 45px;
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            font-family: 'Playfair Display', serif;
            font-weight: bold;
            font-size: 1.5rem;
            box-shadow: 0 4px 10px rgba(217, 165, 179, 0.3);
        }

        .panel {
            border: none;
            border-radius: 1.5rem;
            background-color: #fffdfd;
            box-shadow: 0 1.5rem 3rem rgba(173, 127, 141, 0.1);
            overflow: hidden;
            border: 1px solid rgba(231, 199, 210, 0.5);
        }

        .panel-header {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%);
            color: #fff;
            padding: 1.8rem 2rem;
        }

        /* Form Controls */
        .form-label {
            font-weight: 600;
            color: #7a5c68;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
        }

        .form-control, .form-select {
            border-radius: 10px;
            border: 1px solid #e7c7d2;
            padding: 0.75rem 1rem;
            background-color: #fffcfd;
            transition: all 0.3s ease;
        }

        .form-control:focus, .form-select:focus {
            border-color: var(--lumiere-pink);
            box-shadow: 0 0 0 0.25rem rgba(217, 165, 179, 0.15);
            background-color: white;
        }

        .form-control[readonly] {
            background-color: #f8f9fa;
            color: #9e8a93;
            border-style: dashed;
        }

        /* Buttons */
        .btn-lumiere {
            background-color: var(--lumiere-pink);
            border-color: var(--lumiere-pink);
            color: #fff;
            border-radius: 50px;
            padding: 0.8rem 2rem;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .btn-lumiere:hover {
            background-color: #c88f9f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(200, 143, 159, 0.3);
            color: #fff;
        }

        .btn-lumiere-outline {
            border-color: var(--lumiere-pink);
            color: var(--lumiere-pink);
            background-color: transparent;
            border-radius: 50px;
            padding: 0.8rem 2rem;
            font-weight: 600;
        }

        .btn-lumiere-outline:hover {
            background-color: #fcf1f4;
            color: #8f596c;
        }
    </style>
</head>

<body class="py-5">
<div class="container">
    
    <div class="row align-items-center mb-5">
        <div class="col-md-7 mb-3 mb-md-0">
            <div class="d-flex align-items-center">
                <div class="logo-circle me-3">L</div>
                <div>
                    <h1 class="h2 mb-0 text-dark">Customer Registration</h1>
                    <p class="text-secondary mb-0">Enroll a new client into the Lumière Salon community.</p>
                </div>
            </div>
        </div>
        <div class="col-md-5 text-md-end">
            <a th:href="@{/customers(action='list')}" class="btn btn-lumiere-outline">
                <i class="bi bi-people-fill me-2"></i>View All Customers
            </a>
        </div>
    </div>

    <div class="card panel mx-auto" style="max-width: 900px;">
        <div class="panel-header">
            <h2 class="h4 mb-0"><i class="bi bi-person-plus me-2"></i>Client Details</h2>
        </div>
        
        <div class="card-body p-4 p-md-5">
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-4 shadow-sm border-0 mb-4" role="alert" style="background-color: #fdf1f4; color: #a62a4b;">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <strong th:text="${errorMessage}">This email address is already used by another account.</strong>
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
            <form th:action="@{/customers}" method="post" class="row g-4" autocomplete="off">
                <input type="hidden" name="action" value="register">

                <div class="col-md-4">
                    <label for="userId" class="form-label">System Assigned ID</label>
                    <div class="input-group">
                        <span class="input-group-text bg-light border-end-0 text-muted"><i class="bi bi-hash"></i></span>
                        <input type="number" class="form-control border-start-0" id="userId" name="userId" th:value="${generatedUserId}" readonly>
                    </div>
                </div>

                <div class="col-md-8">
                    <label for="name" class="form-label">Full Name</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-person"></i></span>
                        <input type="text" id="name" name="name" class="form-control border-start-0" placeholder="e.g. Amaya Fernando" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="email" name="email" class="form-control border-start-0" placeholder="name@email.com" required>
                    </div>
                </div>

                <div class="col-md-6">
                    <label for="customerType" class="form-label">Membership Type</label>
                    <div class="input-group">
                        <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-star"></i></span>
                        <select id="customerType" name="customerType" class="form-select border-start-0" required>
                            <option value="Regular" selected>Regular Client</option>
                            <option value="Premium">Premium Member</option>
                        </select>
                    </div>
                </div>

                <div class="col-12 mt-5 border-top pt-4">
                    <div class="d-flex gap-3 justify-content-end">
                        <a th:href="@{/customers(action='list')}" class="btn btn-lumiere-outline">Cancel</a>
                        <button type="submit" class="btn btn-lumiere shadow-sm">
                            <i class="bi bi-check2-circle me-2"></i>Complete Registration
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
