<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Login | Lumière Salon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        body.public-booking {
            display: flex;
            align-items: center;
            min-height: 100vh;
        }
        
        /* Forces the panel-header back to the original pink gradient */
        .login-panel-header-override {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%) !important;
            color: #fff !important;
            padding: 2rem !important;
            text-align: center !important;
            border-bottom: none !important;
        }
        
        .login-panel-header-override h2 {
            color: #fff !important; 
        }
    </style>
</head>

<body class="public-booking"> <div class="container py-5">
    
    <div class="text-center mb-4 mt-5">
        <div class="logo-circle mx-auto">L</div>
        <h1 class="h2 mb-1 mt-3">Customer Login</h1>
        <p class="text-secondary mb-0">Sign in to your Lumière Salon account.</p>
    </div>

    <div class="card panel mx-auto" style="max-width: 500px;">
        <div class="login-panel-header-override">
            <h2 class="h4 mb-0 text-white">Welcome Back</h2>
        </div>
        
        <div class="card-body p-4 p-md-5">
            <div th:if="${successMessage}" class="alert alert-success d-flex align-items-center rounded-3 mb-4" role="alert">
                <i class="bi bi-check-circle-fill me-2"></i>
                <div style="font-size: 0.9rem;" th:text="${successMessage}">Your password has been set.</div>
            </div>

            <div th:if="${errorMessage}" class="alert alert-danger d-flex align-items-center rounded-3 mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <div style="font-size: 0.9rem;" th:text="${errorMessage}">Unable to sign in.</div>
            </div>

            <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center rounded-3 mb-4" role="alert">
                <i class="bi bi-exclamation-triangle-fill me-2"></i>
                <div style="font-size: 0.9rem;">Invalid email or password. Please try again.</div>
            </div>

            <form th:action="@{/customers}" method="post" class="row g-4" autocomplete="off">
                <input type="hidden" name="action" value="login">

                <div class="col-12">
                    <label for="email" class="form-label">Email Address</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                        <input type="email" id="email" name="email" class="form-control" placeholder="yourname@email.com" required autofocus>
                    </div>
                </div>

                <div class="col-12">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group password-container">
                        <span class="input-group-text"><i class="bi bi-shield-lock"></i></span>
                        <input type="password" id="password" name="password" class="form-control" placeholder="Enter your password" required style="border-radius: 0 10px 10px 0 !important;">
                        <i class="bi bi-eye password-toggle" id="togglePassword"></i>
                    </div>
                </div>

                <div class="col-12 text-end mt-0">
                    <a th:href="@{/forgot-password}" class="small text-decoration-none" style="color: #c48c9a;">Forgot password?</a>
                </div>

                <div class="col-12 pt-2 text-center">
                    <button type="submit" class="btn btn-lumiere btn-lg w-100 mb-3 shadow-sm">Login to Account</button>
                    
                    <div class="d-flex align-items-center my-3 text-muted">
                        <hr class="flex-grow-1">
                        <span class="mx-2 small">New to Lumière?</span>
                        <hr class="flex-grow-1">
                    </div>
                    
                    <a th:href="@{/customers(action='public-register')}" class="btn btn-lumiere-outline w-100">
                        Register New Customer
                    </a>
                </div>
            </form>
            
            <div class="text-center mt-4">
                <a href="/" class="text-muted text-decoration-none small">← Back to Main Site</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    const togglePassword = document.querySelector('#togglePassword');
    const passwordField = document.querySelector('#password');

    togglePassword.addEventListener('click', function () {
        const type = passwordField.getAttribute('type') === 'password' ? 'text' : 'password';
        passwordField.setAttribute('type', type);
        this.classList.toggle('bi-eye');
        this.classList.toggle('bi-eye-slash');
    });
</script>

</body>
</html>
