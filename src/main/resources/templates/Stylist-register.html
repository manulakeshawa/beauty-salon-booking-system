<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register Stylist | Lumière Salon</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <link rel="stylesheet" th:href="@{/lumiere-theme.css(v='2.0')}">

    <style>
        .stylist-panel-header-override {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%) !important;
            padding: 1.8rem 2rem !important;
            text-align: center !important;
            border-bottom: none !important;
            border-radius: 1.5rem 1.5rem 0 0;
        }

        .locked-field {
            background-color: #fcf1f4 !important; 
            font-weight: 700 !important; 
            color: #8f596c !important;
            border-style: dashed !important;
            cursor: not-allowed;
        }
    </style>
</head>

<body class="admin-body py-5"> <div class="container">
    
    <div class="row align-items-center mb-5">
        <div class="col-md-7 mb-3 mb-md-0">
            <div class="d-flex align-items-center">
                <div class="logo-circle me-3">L</div>
                <div>
                    <h1 class="h2 mb-0 text-dark">Team Registration</h1>
                    <p class="text-secondary mb-0">Onboard a new professional to the Lumière roster.</p>
                </div>
            </div>
        </div>
        <div class="col-md-5 text-md-end">
            <a th:href="@{/stylists(action='list')}" class="btn btn-lumiere-outline">
                <i class="bi bi-arrow-left me-2"></i>Back to Directory
            </a>
        </div>
    </div>

    <div class="row justify-content-center">
        <div class="col-lg-10 col-xl-9">
            <div class="card panel">
                <div class="stylist-panel-header-override">
                    <h2 class="h4 mb-0 text-white"><i class="bi bi-person-plus me-2"></i>New Stylist Profile</h2>
                </div>
                
                <div class="card-body p-4 p-md-5">
                    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show rounded-4 shadow-sm border-0 mb-4" role="alert" style="background-color: #fdf1f4; color: #a62a4b;">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        <strong th:text="${errorMessage}">This email address is already used by another account.</strong>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    <form th:action="@{/stylists(action='register')}" method="post" autocomplete="off" class="needs-validation" novalidate>
                        
                        <div class="mb-4">
                            <label for="userId" class="form-label">System Assigned ID</label>
                            <div class="input-group" style="max-width: 300px;">
                                <span class="input-group-text"><i class="bi bi-hash"></i></span>
                                <input type="number" id="userId" name="userId" class="form-control locked-field" th:value="${generatedUserId}" readonly>
                            </div>
                        </div>

                        <div class="row g-4 mb-4">
                            <div class="col-md-6">
                                <label for="name" class="form-label">Full Name</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-person"></i></span>
                                    <input type="text" id="name" name="name" class="form-control" placeholder="e.g. Nalika Perera" required>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="email" class="form-label">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-envelope"></i></span>
                                    <input type="email" id="email" name="email" class="form-control" placeholder="name@lumieresalon.lk" required>
                                </div>
                            </div>
                        </div>

                        <div class="row g-4 mb-4">
                            <div class="col-12">
                                <label for="specialty" class="form-label">Primary Specialty</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-stars"></i></span>
                                    <input type="text" id="specialty" name="specialty" class="form-control" 
                                           placeholder="e.g. Skin Rejuvenation" required>
                                </div>
                            </div>
                        </div>

                        <div class="row g-4 mb-5">
                            <div class="col-md-6">
                                <label for="level" class="form-label">Professional Tier</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-award"></i></span>
                                    <select id="level" name="level" class="form-select" required>
                                        <option value="" disabled selected>Choose level...</option>
                                        <option value="Junior">Junior Stylist</option>
                                        <option value="Senior">Senior Stylist</option>
                                        <option value="Lead">Lead Stylist</option>
                                        <option value="Master">Master Stylist</option>
                                    </select>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <label for="available" class="form-label">Starting Availability</label>
                                <div class="input-group">
                                    <span class="input-group-text"><i class="bi bi-toggle-on"></i></span>
                                    <select id="available" name="available" class="form-select" required>
                                        <option th:value="true" selected>Available Immediately</option>
                                        <option th:value="false">Currently Unavailable</option>
                                    </select>
                                </div>
                            </div>
                        </div>

                        <div class="d-grid gap-3 d-md-flex justify-content-md-end pt-3">
                            <a th:href="@{/stylists(action='list')}" class="btn btn-lumiere-outline">Cancel</a>
                            <button type="submit" class="btn btn-lumiere shadow-sm">
                                <i class="bi bi-check2-circle me-2"></i>Create Stylist Account
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Form Validation Logic
    (function () {
        'use strict';
        var forms = document.querySelectorAll('.needs-validation');
        Array.prototype.slice.call(forms).forEach(function (form) {
            form.addEventListener('submit', function (event) {
                if (!form.checkValidity()) {
                    event.preventDefault();
                    event.stopPropagation();
                }
                form.classList.add('was-validated');
            }, false);
        });
    })();
</script>

</body>
</html>
