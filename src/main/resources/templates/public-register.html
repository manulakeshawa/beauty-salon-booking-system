<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Lumière | Premium Salon</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(160deg, #fff9fb 0%, #fdf4f7 50%, #f9eef3 100%);
            min-height: 100vh;
            color: #5f4a55;
            display: flex;
            align-items: center;
        }
        .panel {
            border: none;
            border-radius: 1rem;
            background-color: #fffdfd;
            box-shadow: 0 1rem 2rem rgba(173, 127, 141, 0.16);
            overflow: hidden;
        }
        .panel-header {
            background: linear-gradient(135deg, #e4b7c2 0%, #d9a5b3 100%);
            color: #fff;
            padding: 2rem;
            text-align: center;
        }
        .btn-lumiere {
            background-color: #d9a5b3;
            border-color: #d9a5b3;
            color: #fff;
        }
        .btn-lumiere:hover {
            background-color: #c88f9f;
            border-color: #c88f9f;
            color: #fff;
        }
        .btn-lumiere-outline {
            border-color: #d9a5b3;
            color: #a66f82;
            background-color: #fff9fb;
        }
        .btn-lumiere-outline:hover {
            background-color: #f4dde4;
            border-color: #d9a5b3;
            color: #8f596c;
        }
        .form-control {
            border-color: #e7c7d2;
        }
        .form-control:focus {
            border-color: #d9a5b3;
            box-shadow: 0 0 0 0.2rem rgba(217, 165, 179, 0.2);
        }
    </style>
</head>
<body class="py-5">
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7 col-xl-6">
            <div class="card panel">
                <div class="panel-header">
                    <h1 class="h3 mb-2 fw-bold">Create Your Account</h1>
                    <p class="mb-0 opacity-75">Join Lumière Salon to book appointments and track your premium services.</p>
                </div>
                <div class="card-body p-4 p-md-5">
                    <form th:action="@{/customers(action='public-register')}" method="post">
                        
                        <input type="hidden" name="customerType" value="Regular">

                        <div class="mb-4">
                            <label for="userId" class="form-label fw-semibold" style="color: #a66f82;">Client ID (Auto-Generated)</label>
                            <input type="number" id="userId" name="userId" class="form-control form-control-lg" th:value="${generatedUserId}" readonly style="background-color: #fdf4f7; font-weight: bold; color: #8f596c;">
                        </div>

                        <div class="mb-4">
                            <label for="name" class="form-label fw-semibold">Full Name</label>
                            <input type="text" id="name" name="name" class="form-control form-control-lg" placeholder="Enter your full name" required>
                        </div>

                        <div class="mb-4">
                            <label for="email" class="form-label fw-semibold">Email Address</label>
                            <input type="email" id="email" name="email" class="form-control form-control-lg" placeholder="Enter your email address" required>
                        </div>

                        <div class="mb-5">
                            <label for="password" class="form-label fw-semibold">Create Password</label>
                            <input type="password" id="password" name="password" class="form-control form-control-lg" placeholder="Choose a secure password" required>
                        </div>

                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-lumiere btn-lg fw-bold">Create My Account</button>
                            <a th:href="@{/}" class="btn btn-lumiere-outline btn-lg fw-bold">Return to Homepage</a>
                        </div>
                        
                        <div class="text-center mt-4">
                            <p class="text-muted small">Already have an account? <a th:href="@{/customers(action='login')}" style="color: #c48c9a; font-weight: bold; text-decoration: none;">Sign in here</a>.</p>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
