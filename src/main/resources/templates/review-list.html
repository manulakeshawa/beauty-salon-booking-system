<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Review List</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<header class="site-header" aria-label="Salon dashboard header">
    <div class="inner">
        <div>
            <div class="topbar__title">Beauty Salon Reviews</div>
            <div class="topbar__subtitle"></div>
        </div>
        <nav aria-label="Primary">
            <a class="btn btn--secondary" href="/admin">Return to Dashboard</a>
            <a class="btn btn--primary" href="/reviews">Reviews</a>
            <a class="btn" href="/admin/reviews">Admin</a>
        </nav>
    </div>
</header>

<main class="page-wrapper page-wrapper--list" aria-label="Review list page">
    <div class="container container--list">

        <h2 class="title">All Reviews</h2>
        <p class="subtitle">View customer feedback (filter by service or stylist)</p>

        <form class="filter-form" action="/reviews" method="get" aria-label="Filter reviews">
            <div class="filter-grid">
                <div>
                    <label for="service-filter">Service</label>
                    <input id="service-filter" type="text" name="service" placeholder="e.g., Haircut" th:value="${service}">
                </div>
                <div>
                    <label for="stylist-filter">Stylist</label>
                    <input id="stylist-filter" type="text" name="stylist" placeholder="e.g., Nethmi" th:value="${stylist}">
                </div>
            </div>
            <button class="submit-btn submit-btn--compact" type="submit">Filter</button>
        </form>

        <div class="table-responsive">
        <table class="review-table">
            <thead>
            <tr>
                <th>Review ID</th>
                <th>Type</th>
                <th>Customer</th>
                <th>Service</th>
                <th>Stylist</th>
                <th>Rating</th>
                <th>Comment</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="review : ${reviews}">
                <td th:text="${review.reviewId}"></td>
                <td>
                    <span class="badge" th:text="${review.customerViewHeader}"></span>
                </td>
                <td th:text="${review.customerName}"></td>
                <td th:text="${review.serviceName}"></td>
                <td th:text="${review.stylistName}"></td>
                <td th:text="${review.rating}"></td>
                <td th:text="${review.comment}"></td>
            </tr>
            </tbody>
        </table>
        </div>

        <a class="view-link" href="/admin/reviews">Admin Review Control</a>

    </div>
</main>

</body>
</html>
