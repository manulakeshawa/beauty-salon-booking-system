spring.application.name=beauty-salon-review

server.port=${PORT:8080}

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/beauty_salon_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:}}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.sql.init.mode=never

app.base-url=${APP_BASE_URL:http://localhost:8080}
app.seed.enabled=${APP_SEED_ENABLED:true}
app.email.provider=${EMAIL_PROVIDER:brevo}
app.email.brevo.api-key=${BREVO_API_KEY:}
app.mail.from=${MAIL_FROM:no-reply@lumieresalon.local}
app.mail.from-name=${MAIL_FROM_NAME:Lumiere Salon}
